<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статистика</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
html { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

:root {
  --bg:        #0c0c0c;
  --surface:   #141414;
  --surface2:  #1c1c1c;
  --border:    rgba(255,255,255,0.07);
  --text:      #d8d8d8;
  --muted:     #555;
  --muted2:    #888;
  --accent:    #a78bfa;
  --accent2:   #34d399;
  --accent3:   #fb923c;
  --accent4:   #60a5fa;
  --plus:      #4ade80;
  --minus:     #f87171;
  --zero:      #555;
  --radius:    8px;
  --radius-lg: 12px;
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px; line-height: 1.4;
  padding: 20px 24px 40px;
}

.ftr { display: flex; justify-content: flex-end; align-items: center; margin-top: 20px; margin-bottom: 8px; padding: 14px 24px 0; border-top: 1px solid var(--border); }
.ftr-right { display: flex; gap: 16px; align-items: center; font-size: 11px; color: var(--muted); }
#hdr-status { color: var(--accent2); }

.summary-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.s-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px 18px; flex: 1; min-width: 100px; }
.s-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px; }
.s-val { font-size: clamp(20px, 2vw, 28px); font-weight: 700; line-height: 1; color: var(--text); }
.s-diff { font-size: 14px; font-weight: 600; margin-top: 4px; }
.plus  { color: var(--plus); }
.minus { color: var(--minus); }
.zero  { color: var(--zero); }

.tab-bar { display: flex; gap: 4px; margin-bottom: 14px; }
.tab-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted2); font-size: 12px; padding: 5px 14px; cursor: pointer; transition: all 0.12s; font-family: inherit; }
.tab-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
@media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
.chart-card.wide { grid-column: 1 / -1; }
.cc-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.cc-title { font-size: 12px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.06em; }
.chart-wrap { position: relative; width: 100%; height: 160px; }

.legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted2); }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- totals (all-time) -->
<div class="summary-lable s-label" style="font-size: 1.05rem;">За все время</div>
<div class="summary-row">
  <div class="s-card"><div class="s-label">Участники</div><div class="s-val" id="t-members">—</div></div>
  <div class="s-card"><div class="s-label">Посты</div><div class="s-val" id="t-posts">—</div></div>
  <div class="s-card"><div class="s-label">Комменты</div><div class="s-val" id="t-comments">—</div></div>
  <div class="s-card"><div class="s-label">Лайки</div><div class="s-val" id="t-likes">—</div></div>
  <div class="s-card"><div class="s-label">Сообщения</div><div class="s-val" id="t-messages">—</div></div>
  <div class="s-card"><div class="s-label">Фото</div><div class="s-val" id="t-photos">—</div></div>
  <div class="s-card"><div class="s-label">Видео</div><div class="s-val" id="t-videos">—</div></div>
</div>

<!-- range buttons -->
<div class="tab-bar-lable s-label" style="padding-top: 30px; font-size: 1.05rem;">За указаный промежуток времени</div>
<div class="tab-bar">
  <button class="tab-btn" onclick="setRange('month',this)">30 дней</button>
  <button class="tab-btn active" onclick="setRange('week',this)">7 дней</button>
  <button class="tab-btn" onclick="setRange('day',this)">24 часа</button>
</div>

<!-- period totals + delta -->
<div class="summary-row">
  <div class="s-card">
    <div class="s-label">Участники</div>
    <div class="s-val" id="p-joined">—</div>
    <div class="s-diff" id="p-members-diff">—</div>
  </div>
  <div class="s-card"><div class="s-label">Посты</div><div class="s-val" id="p-posts">—</div></div>
  <div class="s-card"><div class="s-label">Комменты</div><div class="s-val" id="p-comments">—</div></div>
  <div class="s-card"><div class="s-label">Лайки</div><div class="s-val" id="p-likes">—</div></div>
  <div class="s-card"><div class="s-label">Сообщения</div><div class="s-val" id="p-messages">—</div></div>
  <div class="s-card"><div class="s-label">Фото</div><div class="s-val" id="p-photos">—</div></div>
  <div class="s-card"><div class="s-label">Видео</div><div class="s-val" id="p-videos">—</div></div>
</div>

<!-- charts -->
<div class="charts-grid">
  <div class="chart-card wide">
    <div class="cc-header"><span class="cc-title">Общая активность</span></div>
    <div class="chart-wrap" style="height:200px"><canvas id="c-activity"></canvas></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>Посты</div>
      <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div>Комменты</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fb923c"></div>Лайки</div>
    </div>
  </div>
  <div class="chart-card"><div class="cc-header"><span class="cc-title">Посты</span></div><div class="chart-wrap"><canvas id="c-posts"></canvas></div></div>
  <div class="chart-card"><div class="cc-header"><span class="cc-title">Комменты</span></div><div class="chart-wrap"><canvas id="c-comments"></canvas></div></div>
  <div class="chart-card"><div class="cc-header"><span class="cc-title">Лайки</span></div><div class="chart-wrap"><canvas id="c-likes"></canvas></div></div>
  <div class="chart-card"><div class="cc-header"><span class="cc-title">Сообщения</span></div><div class="chart-wrap"><canvas id="c-messages"></canvas></div></div>
  <div class="chart-card"><div class="cc-header"><span class="cc-title">Фото</span></div><div class="chart-wrap"><canvas id="c-photos"></canvas></div></div>
  <div class="chart-card"><div class="cc-header"><span class="cc-title">Видео</span></div><div class="chart-wrap"><canvas id="c-videos"></canvas></div></div>
  <div class="chart-card wide">
    <div class="cc-header"><span class="cc-title">Участники</span></div>
    <div class="chart-wrap"><canvas id="c-members"></canvas></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#4ade80"></div>Вступили</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f87171"></div>Ушли</div>
    </div>
  </div>
</div>

<!-- footer -->
<div class="ftr">
  <div class="ftr-right">
    <span id="hdr-date"></span>
    <span id="hdr-status">ожидание...</span>
    <span id="ftr-updated"></span>
  </div>
</div>

<script>
let state = {}, range = "week", charts = {};

const GRID = "rgba(255,255,255,0.05)", TICKC = "#444";

function baseOpts() {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: { backgroundColor:"#1a1a1a", borderColor:"rgba(255,255,255,0.1)", borderWidth:1, titleColor:"#d8d8d8", bodyColor:"#888", padding:10, cornerRadius:8 }
    },
    scales: {
      x: { grid:{ color:GRID }, ticks:{ color:TICKC, font:{size:11}, autoSkip:false, maxRotation:0 }, border:{ color:"transparent" } },
      y: { min:0, grid:{ color:GRID }, ticks:{ color:TICKC, font:{size:11}, precision:0 }, border:{ color:"transparent" } }
    }
  };
}

function ds(label, data, color) {
  return { label, data, borderColor:color, backgroundColor:color+"18", borderWidth:2, pointRadius:3, pointBackgroundColor:color, tension:0.35, fill:false };
}

function mkChart(id, cfg) { if(charts[id]) charts[id].destroy(); charts[id] = new Chart(document.getElementById(id), cfg); }
function el(id) { return document.getElementById(id); }
function getPeriod() { return state[range] || null; }

function renderTotals(d) {
  el("hdr-date").textContent   = d.date || "";
  el("t-members").textContent  = d.total_members  ?? "—";
  el("t-posts").textContent    = d.total_posts    ?? "—";
  el("t-comments").textContent = d.total_comments ?? "—";
  el("t-likes").textContent    = d.total_likes    ?? "—";
  el("t-messages").textContent = d.total_messages ?? "—";
  el("t-photos").textContent   = d.total_photos   ?? "—";
  el("t-videos").textContent   = d.total_videos   ?? "—";
}

function renderPeriodRow() {
  const p = getPeriod(); if(!p) return;
  const t = p.totals;

  el("p-joined").textContent = t.joined;
  const net = t.joined - t.left;
  const cls = net > 0 ? "plus" : net < 0 ? "minus" : "zero";
  const fmt = net > 0 ? "+"+net : net === 0 ? "±0" : String(net);
  el("p-members-diff").innerHTML = '<span style="color:var(--muted);font-size:10px;margin-right:4px;">чистый прирост:</span><span class="'+cls+'">'+fmt+'</span>';

  function fmtVal(v) {
    if (v == null) return '<span class="zero">—</span>';
    if (v === 0)   return '<span class="zero">0</span>';
    return '<span class="plus">+' + v + '</span>';
  }

  el("p-posts").innerHTML    = fmtVal(t.posts);
  el("p-comments").innerHTML = fmtVal(t.comments);
  el("p-likes").innerHTML    = fmtVal(t.likes);
  el("p-messages").innerHTML = fmtVal(t.messages);
  el("p-photos").innerHTML   = fmtVal(t.photos);
  el("p-videos").innerHTML   = fmtVal(t.videos);
}

function renderCharts() {
  const p = getPeriod(); if(!p || !p.points.length) return;
  const pts = p.points, labels = pts.map(p=>p.label);

  mkChart("c-activity", { type:"line", data:{ labels, datasets:[
    ds("Посты",pts.map(p=>p.posts),"#a78bfa"), ds("Комменты",pts.map(p=>p.comments),"#34d399"), ds("Лайки",pts.map(p=>p.likes),"#fb923c")
  ]}, options:baseOpts() });
  mkChart("c-posts",    { type:"line", data:{ labels, datasets:[ds("Посты",pts.map(p=>p.posts),"#a78bfa")] }, options:baseOpts() });
  mkChart("c-comments", { type:"line", data:{ labels, datasets:[ds("Комменты",pts.map(p=>p.comments),"#34d399")] }, options:baseOpts() });
  mkChart("c-likes",    { type:"line", data:{ labels, datasets:[ds("Лайки",pts.map(p=>p.likes),"#fb923c")] }, options:baseOpts() });
  mkChart("c-messages", { type:"line", data:{ labels, datasets:[ds("Сообщения",pts.map(p=>p.messages),"#60a5fa")] }, options:baseOpts() });
  mkChart("c-photos",   { type:"line", data:{ labels, datasets:[ds("Фото",pts.map(p=>p.photos),"#f472b6")] }, options:baseOpts() });
  mkChart("c-videos",   { type:"line", data:{ labels, datasets:[ds("Видео",pts.map(p=>p.videos),"#facc15")] }, options:baseOpts() });
  mkChart("c-members",  { type:"line", data:{ labels, datasets:[
    ds("Вступили",pts.map(p=>p.joined),"#4ade80"), ds("Ушли",pts.map(p=>p.left),"#f87171")
  ]}, options:baseOpts() });
}

function render(d) { renderTotals(d); renderPeriodRow(); renderCharts(); el("ftr-updated").textContent = "обновлено " + new Date().toLocaleTimeString("ru-RU"); }

function setRange(r, btn) {
  range = r;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderPeriodRow(); renderCharts();
}

async function fetchJson() {
  try { const r = await fetch("/stats/json"); if(!r.ok) return; const d = await r.json(); if(d && Object.keys(d).length){ state=d; render(state); el("hdr-status").textContent="ok"; } }
  catch(e) { el("hdr-status").textContent = "нет связи"; }
}
async function poll() {
  try { const r = await fetch("/stats/is_data_invalid"); if(!r.ok){ el("hdr-status").textContent="ошибка "+r.status; return; } if(await r.json()) await fetchJson(); }
  catch(e) { el("hdr-status").textContent = "нет связи"; }
}
fetchJson(); setInterval(poll, 2500);
</script>
</body>
</html>
