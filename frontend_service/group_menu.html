<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Группы</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --surface: #141414;
  --surface2: #1a1a1a;
  --border:  rgba(255,255,255,0.07);
  --text:    #d8d8d8;
  --muted:   #555;
  --muted2:  #888;
  --accent:  #a78bfa;
  --radius:  12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  padding: 28px 24px;
  min-height: 100vh;
}

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 18px;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

/* ── Group card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 18px;
  width: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  user-select: none;
}

.card:hover {
  border-color: var(--accent);
  background: rgba(167,139,250,0.05);
  transform: translateY(-1px);
}

.card.active {
  border-color: var(--accent);
  background: rgba(167,139,250,0.09);
}

/* Avatar circle */
.avatar {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s;
}

.card:hover .avatar,
.card.active .avatar {
  border-color: rgba(167,139,250,0.4);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-placeholder {
  font-size: 22px;
  color: var(--muted);
  font-weight: 600;
  line-height: 1;
}

/* Text block */
.card-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  text-align: center;
  width: 100%;
}

.card-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.3;
  word-break: break-word;
}

.card-members {
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 0.02em;
}

.card-members span {
  color: var(--muted);
  margin-right: 3px;
}

/* Empty / loading states */
.state-msg {
  color: var(--muted);
  font-size: 12px;
}
</style>
</head>
<body>

<div class="section-label">Выберите группу</div>
<div class="cards" id="cards">
  <span class="state-msg">загрузка...</span>
</div>

<script>
async function load() {
  const r = await fetch("/front/api/groups");
  const d = await r.json();
  const container = document.getElementById("cards");

  // d.groups — массив объектов { group_id, name, photo_url, members_count }
  // Fallback: если сервер пока возвращает только group_ids
  const groups = d.groups ?? (d.group_ids?.map(id => ({ group_id: id })) ?? []);

  if (!groups.length) {
    container.innerHTML = '<span class="state-msg">Нет доступных групп</span>';
    return;
  }

  const parentQs = new URLSearchParams(window.parent.location.search);
  const activeId = parentQs.get("group_id");

  container.innerHTML = groups.map(g => {
    const isActive = String(g.group_id) === activeId;
    const avatarHtml = g.photo_url
      ? `<img src="${g.photo_url}" alt="" loading="lazy">`
      : `<span class="avatar-placeholder">${getInitial(g.name, g.group_id)}</span>`;

    const membersHtml = g.members_count != null
      ? `<div class="card-members"><span>подписчиков</span>${formatNum(g.members_count)}</div>`
      : '';

    const nameHtml = g.name
      ? `<div class="card-name">${escHtml(g.name)}</div>`
      : `<div class="card-name" style="color:var(--muted)">ID ${g.group_id}</div>`;

    return `
      <div class="card${isActive ? ' active' : ''}" onclick="selectGroup(${g.group_id})">
        <div class="avatar">${avatarHtml}</div>
        <div class="card-info">
          ${nameHtml}
          ${membersHtml}
        </div>
      </div>`;
  }).join("");
}

function selectGroup(group_id) {
  window.parent.postMessage({ type: "select_group", group_id }, "*");
}

function getInitial(name, id) {
  if (name) return name.trim()[0].toUpperCase();
  return String(id).slice(-2);
}

function formatNum(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return String(n);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

load();
</script>
</body>
</html>
