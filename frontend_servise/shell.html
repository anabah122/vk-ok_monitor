<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель управления</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --surface: #111;
  --border:  rgba(255,255,255,0.1);
  --text:    #d8d8d8;
  --muted:   #666;
  --accent:  #a78bfa;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
html { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.menu-bar {
  width: 80%;
  max-width: 1400px;
  margin-top: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 42px;
  font-size: 12px;
  letter-spacing: 0.04em;
}

.menu-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
  font-family: inherit;
  padding: 5px 14px;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.menu-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }
.menu-btn.active { border-color: var(--accent); color: var(--accent); }

.content {
  width: 80%;
  max-width: 1400px;
  margin-top: 12px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.content iframe {
  width: 100%;
  border: none;
  display: block;
  overflow: hidden;
}
</style>
</head>
<body>

<div class="menu-bar" id="menu">
  <button class="menu-btn" id="btn-groups" onclick="loadGroupMenu()">Группы</button>
</div>

<div class="content">
  <iframe src="" id="content-frame" scrolling="no"></iframe>
</div>

<script>
const frame = document.getElementById("content-frame");

function resizeFrame() {
  try {
    const h = frame.contentDocument.documentElement.scrollHeight;
    if (h > 0) frame.style.height = h + "px";
  } catch(e) {}
}

frame.addEventListener("load", () => {
  resizeFrame();
  try {
    const obs = new MutationObserver(resizeFrame);
    obs.observe(frame.contentDocument.body, { childList: true, subtree: true, attributes: true });
  } catch(e) {}
  setInterval(resizeFrame, 2500);
});

function loadGroupMenu() {
  document.getElementById("btn-groups").classList.add("active");
  frame.src = "/group-menu";
}

function loadStats(group_id) {
  document.getElementById("btn-groups").classList.remove("active");
  frame.src = "/stats?group_id=" + group_id;
  history.replaceState(null, "", "/?group_id=" + group_id);
}

window.addEventListener("message", (e) => {
  if (e.data?.type === "select_group") {
    loadStats(e.data.group_id);
  }
});

const qs = new URLSearchParams(location.search);
const gid = qs.get("group_id");
if (gid) {
  loadStats(gid);
} else {
  loadGroupMenu();
}
</script>
</body>
</html>
