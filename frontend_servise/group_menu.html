<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Группы</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c0c;
  --surface: #141414;
  --border:  rgba(255,255,255,0.07);
  --text:    #d8d8d8;
  --muted:   #555;
  --muted2:  #888;
  --accent:  #a78bfa;
  --radius:  10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  padding: 24px;
}

.title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 16px;
}

.bubbles {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 18px;
  font-size: 13px;
  color: var(--muted2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  user-select: none;
}

.bubble:hover { border-color: var(--accent); color: var(--accent); }
.bubble.active { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,0.07); }

.empty { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<div class="title">Выберите группу</div>
<div class="bubbles" id="bubbles"><span class="empty">загрузка...</span></div>

<script>
async function load() {
  const r = await fetch("/api/groups");
  const d = await r.json();
  const container = document.getElementById("bubbles");

  if (!d.group_ids || !d.group_ids.length) {
    container.innerHTML = '<span class="empty">Нет доступных групп</span>';
    return;
  }

  const parentQs = new URLSearchParams(window.parent.location.search);
  const activeId = parentQs.get("group_id");

  container.innerHTML = d.group_ids.map(id => {
    const cls = String(id) === activeId ? "bubble active" : "bubble";
    return `<div class="${cls}" onclick="selectGroup(${id})">${id}</div>`;
  }).join("");
}

function selectGroup(group_id) {
  window.parent.postMessage({ type: "select_group", group_id }, "*");
}

load();
</script>
</body>
</html>
